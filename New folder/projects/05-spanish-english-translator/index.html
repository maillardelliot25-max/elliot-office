<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spanish ↔ English Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#58a6ff;--pl:#79c0ff;--pd:#3fb950;--pp:#0d1117;--pb:#161b22}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0d1117;color:#c9d1d9;-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Playfair Display',Georgia,serif;color:#58a6ff}
#shell{display:flex;flex-direction:column;height:100vh;max-width:1000px;margin:0 auto;background:#0d1117}
.topbar{padding:20px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px}
.logo-dot{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#58a6ff,#79c0ff);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:22px;font-weight:700;color:#58a6ff}
.scroll{flex:1;overflow-y:auto;padding:30px 20px}
.panes{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pane{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:20px;display:flex;flex-direction:column}
.pane-title{color:#58a6ff;font-size:14px;font-weight:700;margin-bottom:12px}
textarea{width:100%;flex:1;min-height:200px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:12px;border-radius:10px;font-family:inherit;font-size:14px;resize:none}
textarea:focus{border-color:#58a6ff;outline:none}
.btns{display:flex;gap:10px;margin-top:12px}
.btn{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:600;border-radius:10px;padding:12px;transition:all .15s;font-size:13px}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-swap{background:#58a6ff;color:#0d1117}
.btn-swap:hover{background:#79c0ff}
.status{margin-top:12px;padding:8px;background:#0d1117;border-left:3px solid #58a6ff;border-radius:6px;font-size:12px;color:#8b949e}
@media(max-width:768px){
.panes{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="shell">
<div class="topbar">
<div class="logo-dot">🌐</div>
<div class="logo-name">Spanish ↔ English</div>
</div>
<div class="scroll">
<div class="panes">
<div class="pane">
<div class="pane-title">📝 Spanish</div>
<textarea id="spanishText" placeholder="Enter Spanish text..."></textarea>
<div class="btns">
<button class="btn btn-primary" onclick="translateToEnglish()">→ English</button>
<button class="btn btn-swap" onclick="swapLanguages()">⇄ Swap</button>
</div>
</div>
<div class="pane">
<div class="pane-title">📝 English</div>
<textarea id="englishText" placeholder="English translation..."></textarea>
<div class="btns">
<button class="btn btn-primary" onclick="translateToSpanish()">← Spanish</button>
</div>
<div class="status" id="status"></div>
</div>
</div>
</div>
</div>
</div>
<script>
const translations={
'hola':'hello','goodbye':'goodbye','gracias':'thank you','por favor':'please',
'sí':'yes','no':'no','buenos días':'good morning','buenas noches':'good night',
'cómo estás':'how are you','mi nombre es':'my name is','te amo':'i love you',
'hermoso':'beautiful','agua':'water','comida':'food','amigo':'friend'
};
function translateToEnglish(){
const spanish=document.getElementById('spanishText').value;
if(!spanish.trim())return alert('Enter Spanish text');
const status=document.getElementById('status');
status.textContent='Translating...';
setTimeout(()=>{
let result=spanish.toLowerCase();
Object.entries(translations).forEach(([esp,eng])=>{
const regex=new RegExp('\\b'+esp+'\\b','gi');
result=result.replace(regex,eng);
});
result=result.charAt(0).toUpperCase()+result.slice(1);
document.getElementById('englishText').value=result;
status.textContent='✓ Translation complete';
},400);
}
function translateToSpanish(){
const english=document.getElementById('englishText').value;
if(!english.trim())return alert('Enter English text');
const status=document.getElementById('status');
status.textContent='Translating...';
setTimeout(()=>{
let result=english.toLowerCase();
Object.entries(translations).forEach(([esp,eng])=>{
const regex=new RegExp('\\b'+eng+'\\b','gi');
result=result.replace(regex,esp);
});
result=result.charAt(0).toUpperCase()+result.slice(1);
document.getElementById('spanishText').value=result;
status.textContent='✓ Translation complete';
},400);
}
function swapLanguages(){
const spanish=document.getElementById('spanishText').value;
const english=document.getElementById('englishText').value;
document.getElementById('spanishText').value=english;
document.getElementById('englishText').value=spanish;
}
</script>
</body>
</html>
