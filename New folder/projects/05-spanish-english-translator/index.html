<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Universal Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);color:#c9d1d9}
h1,h2{font-family:'Playfair Display',Georgia,serif}
#shell{display:flex;flex-direction:column;height:100vh;max-width:1200px;margin:0 auto;background:transparent}
.topbar{padding:30px 20px;background:rgba(22,27,34,0.8);backdrop-filter:blur(10px);border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;flex-shrink:0}
.logo-dot{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#58a6ff,#79c0ff);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 16px rgba(88,166,255,.2)}
.logo-name{font-size:26px;font-weight:700;color:#58a6ff;letter-spacing:-0.5px}
.scroll{flex:1;overflow-y:auto;padding:40px 20px}
.language-selector{display:flex;gap:12px;margin-bottom:30px;flex-wrap:wrap;padding:20px;background:rgba(22,27,34,0.6);border-radius:14px;backdrop-filter:blur(10px)}
.lang-label{align-self:center;color:#8b949e;font-size:14px;font-weight:600;text-transform:uppercase}
select{background:rgba(13,17,23,0.8);border:2px solid #30363d;color:#c9d1d9;padding:12px 16px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
select:hover{border-color:#58a6ff}
select:focus{border-color:#79c0ff;outline:none;box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.panes{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.pane{background:rgba(22,27,34,0.7);border:1px solid #30363d;border-radius:16px;padding:24px;display:flex;flex-direction:column;backdrop-filter:blur(10px);transition:all .3s}
.pane:hover{border-color:#58a6ff;box-shadow:0 12px 32px rgba(88,166,255,.1)}
.pane-title{color:#58a6ff;font-size:16px;font-weight:700;margin-bottom:16px;font-family:'Playfair Display',serif}
textarea{width:100%;flex:1;min-height:200px;background:rgba(13,17,23,0.9);border:1px solid #30363d;color:#c9d1d9;padding:16px;border-radius:10px;font-family:'Courier New',monospace;font-size:14px;resize:none;transition:all .2s}
textarea:focus{border-color:#79c0ff;outline:none;box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.btns{display:flex;gap:12px;margin-top:16px}
.btn{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:600;border-radius:10px;padding:14px;transition:all .2s;font-size:14px;text-transform:uppercase;letter-spacing:0.5px}
.btn-primary{background:linear-gradient(135deg,#238636,#2ea043);color:#fff;box-shadow:0 4px 12px rgba(35,134,54,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(35,134,54,.3)}
.btn-primary:active{transform:translateY(0)}
.btn-swap{background:linear-gradient(135deg,#58a6ff,#79c0ff);color:#0d1117;box-shadow:0 4px 12px rgba(88,166,255,.2)}
.btn-swap:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(88,166,255,.3)}
.btn-swap:active{transform:translateY(0)}
.status{margin-top:16px;padding:12px 16px;background:rgba(13,17,23,0.8);border-left:4px solid #58a6ff;border-radius:8px;font-size:13px;color:#8b949e;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
.panes{grid-template-columns:1fr}
.language-selector{flex-direction:column}
select{width:100%}
.topbar{padding:20px}
.logo-dot{width:40px;height:40px;font-size:20px}
.logo-name{font-size:20px}
}
</style>
</head>
<body>
<div id="shell">
<div class="topbar">
<div class="logo-dot">🌍</div>
<div class="logo-name">Universal Translator</div>
</div>
<div class="scroll">
<div class="language-selector">
<select id="lang1" onchange="updateLabels()">
<option value="es">Spanish</option>
<option value="en" selected>English</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="pt">Portuguese</option>
<option value="it">Italian</option>
<option value="ja">Japanese</option>
<option value="zh">Chinese</option>
</select>
<span style="align-self:center;color:#8b949e">⇄</span>
<select id="lang2" onchange="updateLabels()">
<option value="es">Spanish</option>
<option value="en" selected>English</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="pt">Portuguese</option>
<option value="it">Italian</option>
<option value="ja">Japanese</option>
<option value="zh">Chinese</option>
</select>
</div>
<div class="panes">
<div class="pane">
<div class="pane-title" id="label1">📝 English</div>
<textarea id="text1" placeholder="Enter text..."></textarea>
<div class="btns">
<button class="btn btn-primary" onclick="translate(1,2)">Translate →</button>
<button class="btn btn-swap" onclick="swap()">⇄ Swap</button>
</div>
</div>
<div class="pane">
<div class="pane-title" id="label2">📝 English</div>
<textarea id="text2" placeholder="Translation will appear here..." readonly></textarea>
<div class="btns">
<button class="btn btn-primary" onclick="translate(2,1)">← Translate</button>
</div>
<div class="status" id="status"></div>
</div>
</div>
</div>
</div>
<script>
const languages = {
  en: 'English',
  es: 'Spanish',
  fr: 'French',
  de: 'German',
  pt: 'Portuguese',
  it: 'Italian',
  ja: 'Japanese',
  zh: 'Chinese'
};

const translations = {
  en: {
    es: {'hello':'hola','goodbye':'adiós','good morning':'buenos días','good night':'buenas noches','thank you':'gracias','please':'por favor','yes':'sí','no':'no','how are you':'¿cómo estás?','my name is':'mi nombre es','i love you':'te amo','beautiful':'hermoso','water':'agua','food':'comida','friend':'amigo','nice to meet you':'encantado de conocerte','where is':'¿dónde está','how much':'cuánto cuesta','can you help':'¿puedes ayudar','i am sorry':'lo siento','i understand':'entiendo'},
    fr: {'hello':'bonjour','goodbye':'au revoir','good morning':'bon matin','good night':'bonne nuit','thank you':'merci','please':'s\'il vous plaît','yes':'oui','no':'non','how are you':'comment allez-vous?','my name is':'je m\'appelle','i love you':'je t\'aime','beautiful':'beau','water':'eau','food':'nourriture','friend':'ami','nice to meet you':'enchanté de vous rencontrer','where is':'où est','how much':'combien ça coûte','can you help':'pouvez-vous aider','i am sorry':'je suis désolé','i understand':'je comprends'},
    de: {'hello':'hallo','goodbye':'auf wiedersehen','good morning':'guten morgen','good night':'gute nacht','thank you':'danke','please':'bitte','yes':'ja','no':'nein','how are you':'wie geht es dir?','my name is':'mein name ist','i love you':'ich liebe dich','beautiful':'schön','water':'wasser','food':'essen','friend':'freund','nice to meet you':'schön dich kennenzulernen','where is':'wo ist','how much':'wie viel kostet','can you help':'kannst du helfen','i am sorry':'es tut mir leid','i understand':'ich verstehe'}
  },
  es: {
    en: {'hola':'hello','adiós':'goodbye','buenos días':'good morning','buenas noches':'good night','gracias':'thank you','por favor':'please','sí':'yes','no':'no','¿cómo estás?':'how are you','mi nombre es':'my name is','te amo':'i love you','hermoso':'beautiful','agua':'water','comida':'food','amigo':'friend','encantado de conocerte':'nice to meet you','¿dónde está':'where is','cuánto cuesta':'how much','¿puedes ayudar':'can you help','lo siento':'i am sorry','entiendo':'i understand'},
    fr: {'hola':'bonjour','gracias':'merci','sí':'oui','no':'non','amigo':'ami','hermoso':'beau','agua':'eau','comida':'nourriture','buenos días':'bon matin','buenas noches':'bonne nuit'}
  }
};

function updateLabels() {
  const lang1 = document.getElementById('lang1').value;
  const lang2 = document.getElementById('lang2').value;
  document.getElementById('label1').textContent = '📝 ' + languages[lang1];
  document.getElementById('label2').textContent = '📝 ' + languages[lang2];
  document.getElementById('text1').placeholder = 'Enter ' + languages[lang1] + '...';
  document.getElementById('text2').placeholder = 'Translation in ' + languages[lang2] + '...';
}

function translate(from, to) {
  const srcLang = document.getElementById('lang' + from).value;
  const tgtLang = document.getElementById('lang' + to).value;
  const text = document.getElementById('text' + from).value;

  if (!text.trim()) {
    alert('Enter text to translate');
    return;
  }

  const status = document.getElementById('status');
  status.textContent = 'Translating...';

  setTimeout(() => {
    let result = text.toLowerCase();
    const dict = translations[srcLang] && translations[srcLang][tgtLang];

    if (dict) {
      Object.entries(dict).forEach(([src, tgt]) => {
        const regex = new RegExp('\\b' + src + '\\b', 'gi');
        result = result.replace(regex, tgt);
      });
    } else {
      result = text + '\n\n[Translation unavailable for this language pair]';
    }

    result = result.charAt(0).toUpperCase() + result.slice(1);
    document.getElementById('text' + to).value = result;
    status.textContent = '✓ Translation complete';
  }, 300);
}

function swap() {
  const text1 = document.getElementById('text1').value;
  const text2 = document.getElementById('text2').value;
  document.getElementById('text1').value = text2;
  document.getElementById('text2').value = text1;

  const lang1 = document.getElementById('lang1').value;
  const lang2 = document.getElementById('lang2').value;
  document.getElementById('lang1').value = lang2;
  document.getElementById('lang2').value = lang1;

  updateLabels();
}

updateLabels();
</script>
</body>
</html>
