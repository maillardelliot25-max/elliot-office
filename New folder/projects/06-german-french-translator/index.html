<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>German → Québécois French</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#58a6ff;--pl:#79c0ff}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0d1117;color:#c9d1d9}
h1{font-family:'Playfair Display',Georgia,serif;color:#58a6ff}
#shell{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;background:#0d1117}
.topbar{padding:20px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px}
.logo-dot{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#58a6ff,#79c0ff);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:22px;font-weight:700;color:#58a6ff}
.scroll{flex:1;overflow-y:auto;padding:30px 20px}
.container{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:20px}
.input-group{margin-bottom:20px}
.label{color:#58a6ff;font-size:13px;font-weight:700;margin-bottom:8px;display:block}
textarea{width:100%;min-height:150px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:12px;border-radius:10px;font-family:inherit;font-size:14px;resize:vertical}
textarea:focus{border-color:#58a6ff;outline:none}
.btn{width:100%;background:#238636;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;margin-top:12px;transition:all .15s}
.btn:hover{background:#2ea043}
.info{margin-top:12px;padding:10px;background:#0d1117;border-left:3px solid:#238636;border-radius:6px;font-size:12px;color:#8b949e}
.status{margin-top:12px;padding:8px;background:#0d1117;border-left:3px solid:#58a6ff;border-radius:6px;font-size:12px;color:#8b949e}
</style>
</head>
<body>
<div id="shell">
<div class="topbar">
<div class="logo-dot">🇩🇪🇫🇷</div>
<div class="logo-name">German → French (Use Universal)</div>
</div>
<div class="scroll">
<div class="container">
<div class="input-group">
<label class="label">📝 German Input</label>
<textarea id="germanText" placeholder="Enter German text..."></textarea>
<button class="btn" onclick="translate()">Translate to Québécois French →</button>
</div>
<div class="input-group">
<label class="label">📝 Québécois French Output</label>
<textarea id="frenchText" placeholder="French translation..." readonly></textarea>
<div class="info">🌍 Québécois variant: tu/c'est/y'a</div>
</div>
<div class="status" id="status"></div>
</div>
</div>
</div>
<script>
const germanToFrench={
'hallo':'allô','guten tag':'bon jour','guten morgen':'bon matin',
'guten abend':'bonsoir','wie geht es dir':'comment tu vas?',
'danke':'merci','bitte':'s\'il te plaît','ja':'oui','nein':'non',
'ich liebe dich':'je t\'aime','schöne':'beau','wasser':'eau',
'essen':'manger','freund':'ami','guten nacht':'bonne nuit'
};
function translate(){
const german=document.getElementById('germanText').value;
if(!german.trim())return alert('Enter German text');
const status=document.getElementById('status');
status.textContent='Translating...';
setTimeout(()=>{
let result=german.toLowerCase();
Object.entries(germanToFrench).forEach(([de,fr])=>{
const regex=new RegExp('\\b'+de+'\\b','gi');
result=result.replace(regex,fr);
});
result=result.charAt(0).toUpperCase()+result.slice(1);
document.getElementById('frenchText').value=result;
status.textContent='✓ Québécois variant applied';
},400);
}
</script>
</body>
</html>
