<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Metrics Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0d1117;color:#c9d1d9}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif;color:#58a6ff}
#shell{display:flex;flex-direction:column;height:100vh;background:#0d1117}
.topbar{padding:20px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-dot{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#58a6ff,#79c0ff);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:22px;font-weight:700;color:#58a6ff}
.controls{display:flex;gap:10px}
.btn{background:#238636;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;transition:all .15s}
.btn:hover{background:#2ea043}
.btn-reset{background:#da3633}
.btn-reset:hover{background:#f85149}
.scroll{flex:1;overflow-y:auto;padding:30px 20px}
.container{max-width:1400px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px}
.stat-box{background:rgba(22,27,34,0.6);border:1px solid #30363d;border-radius:14px;padding:24px;text-align:center;transition:all .3s;backdrop-filter:blur(10px)}
.stat-box:nth-child(1){border-color:#3fb950}
.stat-box:nth-child(2){border-color:#1f6feb}
.stat-box:nth-child(3){border-color:#f59e0b}
.stat-box:nth-child(4){border-color:#ef4444}
.stat-box:hover{transform:translateY(-4px);border-color:#58a6ff}
.stat-number{font-size:32px;color:#58a6ff;font-weight:700;font-family:'Playfair Display',serif;margin-bottom:10px;letter-spacing:-1px}
.stat-label{font-size:13px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:20px}
.chart-box{background:rgba(22,27,34,0.6);border:1px solid #30363d;border-radius:14px;padding:24px;transition:all .3s;backdrop-filter:blur(10px)}
.chart-box:hover{border-color:#58a6ff;box-shadow:0 8px 24px rgba(88,166,255,.1)}
.chart-title{font-size:15px;color:#58a6ff;font-weight:700;margin-bottom:18px;font-family:'Playfair Display',serif;letter-spacing:-0.5px}
canvas{width:100%;height:300px;border-radius:8px}
</style>
</head>
<body>
<div id="shell">
<div class="topbar">
<div class="logo">
<div class="logo-dot">📊</div>
<div class="logo-name">SaaS Metrics</div>
</div>
<div class="controls">
<button class="btn" onclick="simulateMonth()">Simulate Month</button>
<button class="btn btn-reset" onclick="resetMetrics()">Reset</button>
</div>
</div>
<div class="scroll">
<div class="container">
<div class="stats-grid">
<div class="stat-box">
<div class="stat-number" id="mrr">$45000</div>
<div class="stat-label">Monthly Revenue</div>
</div>
<div class="stat-box">
<div class="stat-number" id="customers">450</div>
<div class="stat-label">Active Customers</div>
</div>
<div class="stat-box">
<div class="stat-number" id="churn">4.2%</div>
<div class="stat-label">Churn Rate</div>
</div>
<div class="stat-box">
<div class="stat-number" id="cac">$180</div>
<div class="stat-label">Customer Acq. Cost</div>
</div>
</div>
<div class="charts-grid">
<div class="chart-box">
<div class="chart-title">MRR Growth (12 months)</div>
<canvas id="mrrChart"></canvas>
</div>
<div class="chart-box">
<div class="chart-title">Active Customers</div>
<canvas id="customersChart"></canvas>
</div>
<div class="chart-box">
<div class="chart-title">Churn Rate Trend</div>
<canvas id="churnChart"></canvas>
</div>
<div class="chart-box">
<div class="chart-title">CAC vs LTC</div>
<canvas id="cacLtcChart"></canvas>
</div>
</div>
</div>
</div>
</div>
<script>
let metrics = {
  mrr: [15000, 18500, 22000, 26000, 30500, 35000, 38500, 40000, 41500, 43000, 44000, 45000],
  customers: [150, 180, 215, 255, 295, 335, 370, 395, 415, 430, 440, 450],
  churn: [8.2, 7.8, 7.2, 6.5, 6.0, 5.5, 5.0, 4.8, 4.5, 4.3, 4.2, 4.2],
  cac: [250, 240, 230, 220, 210, 200, 190, 185, 180, 180, 180, 180],
  ltc: [8500, 8400, 8300, 8200, 8100, 8000, 7900, 7800, 7700, 7600, 7600, 7600]
};

function loadMetrics() {
  const saved = localStorage.getItem('saasMetrics');
  if (saved) {
    try {
      metrics = JSON.parse(saved);
    } catch(e) {
      console.error('Failed to load metrics');
    }
  }
}

function saveMetrics() {
  localStorage.setItem('saasMetrics', JSON.stringify(metrics));
}

function updateStats() {
  const lastMrr = metrics.mrr[metrics.mrr.length - 1];
  const lastCustomers = metrics.customers[metrics.customers.length - 1];
  const lastChurn = metrics.churn[metrics.churn.length - 1];
  const lastCac = metrics.cac[metrics.cac.length - 1];

  document.getElementById('mrr').textContent = '$' + lastMrr.toLocaleString();
  document.getElementById('customers').textContent = lastCustomers;
  document.getElementById('churn').textContent = lastChurn.toFixed(1) + '%';
  document.getElementById('cac').textContent = '$' + lastCac;
}

function drawChart(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const width = canvas.clientWidth;
  const height = 300;

  canvas.width = width;
  canvas.height = height;

  const padding = 40;
  const plotWidth = width - padding * 2;
  const plotHeight = height - padding * 2;

  const maxValue = Math.max(...data);
  const minValue = Math.min(...data);
  const range = maxValue - minValue || 1;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, width, height);

  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = padding + (i / 5) * plotHeight;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(width - padding, y);
    ctx.stroke();
  }

  ctx.strokeStyle = '#238636';
  ctx.lineWidth = 2;
  ctx.beginPath();

  data.forEach((value, index) => {
    const x = padding + (index / (data.length - 1)) * plotWidth;
    const y = padding + plotHeight - ((value - minValue) / range) * plotHeight;

    if (index === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();

  ctx.fillStyle = '#238636';
  data.forEach((value, index) => {
    const x = padding + (index / (data.length - 1)) * plotWidth;
    const y = padding + plotHeight - ((value - minValue) / range) * plotHeight;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function simulateMonth() {
  const lastMrr = metrics.mrr[metrics.mrr.length - 1];
  const growth = 1 + (Math.random() * 0.12 - 0.02);
  const newMrr = Math.round(lastMrr * growth);

  const lastCustomers = metrics.customers[metrics.customers.length - 1];
  const newCustomers = lastCustomers + Math.floor(Math.random() * 50) + 20;

  const lastChurn = metrics.churn[metrics.churn.length - 1];
  const newChurn = Math.max(2, lastChurn - Math.random() * 0.5);

  const lastCac = metrics.cac[metrics.cac.length - 1];
  const newCac = Math.round(lastCac * (1 - Math.random() * 0.05));

  metrics.mrr.push(newMrr);
  metrics.customers.push(newCustomers);
  metrics.churn.push(newChurn);
  metrics.cac.push(newCac);
  metrics.ltc.push(Math.round(newCac * 42));

  if (metrics.mrr.length > 12) {
    metrics.mrr.shift();
    metrics.customers.shift();
    metrics.churn.shift();
    metrics.cac.shift();
    metrics.ltc.shift();
  }

  saveMetrics();
  render();
}

function resetMetrics() {
  if (confirm('Reset all metrics to baseline?')) {
    metrics = {
      mrr: [15000, 18500, 22000, 26000, 30500, 35000, 38500, 40000, 41500, 43000, 44000, 45000],
      customers: [150, 180, 215, 255, 295, 335, 370, 395, 415, 430, 440, 450],
      churn: [8.2, 7.8, 7.2, 6.5, 6.0, 5.5, 5.0, 4.8, 4.5, 4.3, 4.2, 4.2],
      cac: [250, 240, 230, 220, 210, 200, 190, 185, 180, 180, 180, 180],
      ltc: [8500, 8400, 8300, 8200, 8100, 8000, 7900, 7800, 7700, 7600, 7600, 7600]
    };
    saveMetrics();
    render();
  }
}

function render() {
  updateStats();
  drawChart('mrrChart', metrics.mrr);
  drawChart('customersChart', metrics.customers);
  drawChart('churnChart', metrics.churn);
  drawChart('cacLtcChart', metrics.cac);
}

loadMetrics();
render();
window.addEventListener('resize', render);
</script>
</body>
</html>
